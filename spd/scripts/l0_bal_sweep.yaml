# Sweep parameters for stochastic reconstruction subset loss experiments
# This sweep explores different probability distributions and truncation modes

# Experiment-specific parameters
ss_llama_l0_balance:
  # Test different probability values/distributions
  l0_balancing_coeff:
    values: [0, .0001,0.001, 0.01, 0.1, 1.0, 10, 100]

ss_llama_subset_recon:
  # Test different probability values/distributions

  l0_balancing_coeff:
    values: [ .0001, 0.001, 0.01, 0.1, 1.0]
  stochastic_recon_subset_p:
    values: 
     - [0.1, 0.25, 0.5, 0.75, 0.9]  # Sample from all values
  stochastic_recon_subset_mode:
    values: [independent]