# --- WandB ---
wandb_project: spd
# wandb_project: null
wandb_run_name: null
wandb_run_name_prefix: ""

# --- General ---
seed: 0
C: 16000
n_mask_samples: 1
ci_fn_type: "shared_mlp"
ci_fn_hidden_dims: [4000]
sigmoid_type: "leaky_hard"
target_module_patterns: ["transformer.h.1.c_fc, transformer.h.1.c_proj"]
identity_module_patterns: null
sampling: "continuous"
use_delta_component: true
loss_metric_configs:
  - classname: "StochasticReconSubsetLoss"
    coeff: 0.5
  - classname: PGDReconSubsetLoss
    init: "random"
    step_size: 1.0
    n_steps: 1
    mask_scope: "shared_across_batch"
    coeff: 0.5
  - classname: FaithfulnessLoss
    coeff: 1e6
output_loss_type: kl

# --- Training ---
batch_size: 2
steps: 200_000
lr: 2e-4
lr_schedule: cosine
lr_warmup_pct: 0.01
lr_exponential_halflife: null
gradient_accumulation_steps: 1

# --- Faithfulness Warmup ---
faithfulness_warmup_steps: 200
faithfulness_warmup_lr: 0.01
faithfulness_warmup_weight_decay: 0.1

# --- Logging & Saving ---
train_log_freq: 100
eval_freq: 1000
slow_eval_freq: 10000
slow_eval_on_first_step: true
n_eval_steps: 5
save_freq: null
ci_alive_threshold: 0.0
n_examples_until_dead: 3_276_800  # train_log_freq * batch_size * max_seq_len = 100 * 64 * 512
eval_metric_configs:
  - classname: "CIHistograms"
    n_batches_accum: 5
  - classname: "ComponentActivationDensity"
  - classname: "CI_L0"
    groups: null
  - classname: "CEandKLLosses"
    rounding_threshold: 0.0
  - classname: "CIMeanPerComponent"
  - classname: "StochasticHiddenActsReconLoss"
  - classname: "PGDReconLoss"
    init: "random"
    step_size: 0.1
    n_steps: 20
    mask_scope: "shared_across_batch"

# --- Pretrained model info ---
pretrained_model_class: transformers.GPT2LMHeadModel
pretrained_model_name: openai-community/gpt2
pretrained_model_output_attr: logits
tokenizer_name: openai-community/gpt2

# --- Task Specific ---
task_config:
  task_name: lm 
  max_seq_len: 1024
  dataset_name: "apollo-research/Skylion007-openwebtext-tokenizer-gpt2"
  is_tokenized: True
  column_name: "input_ids"
  train_data_split: "train"
  eval_data_split: "train"  # TODO: handle different seeding for train and eval


# Config details for the target model taken from https://github.com/danbraunai/simple_stories_train/blob/main/simple_stories_train/train_gpt2.py#L165
  # class GPTConfig:
  #     block_size: int = 1024
  #     vocab_size: int = 50257
  #     n_layer: int = 12
  #     n_head: int = 12
  #     n_embd: int = 768